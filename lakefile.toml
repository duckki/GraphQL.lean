name = "graphql-lean"
version = "0.1.0"
defaultTargets = ["GraphQL", "Tests"]
lintDriver = "lint"

[[require]]
name = "leanfmt"
git = "https://github.com/duckki/LeanFmt.git"
rev = "main"

[[lean_lib]]
name = "GraphQL"

[[lean_lib]]
name = "Tests"

[[lean_lib]]
name = "LeanImportClosure"

[[lean_exe]]
name = "lint"
root = "Lint"

[[lean_exe]]
name = "import-closure"
root = "LeanImportClosureMain"
